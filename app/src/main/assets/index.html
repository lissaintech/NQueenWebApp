<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>N Queen AI Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <canvas id="confetti"></canvas>

    <div id="homeScreen" class="screen">

<div class="menuCard">

<h1 class="gameTitle">♛ N Queen AI Challenge</h1>

<button class="playBtn" onclick="startLevel(unlockedLevel)">Play</button>

    <button class="resetBtn" onclick="openReset()">Reset Progress</button>
<div id="levels"></div>

</div>

</div>


    <div id="gameScreen" class="screen" style="display:none;">

        <h2>Level <span id="levelDisplay"></span></h2>

        <div class="stats">

            Time: <span id="timer">00:00</span>

            Hints: <span id="hintCount">2</span>

            Moves: <span id="moves">0</span>

        </div>

        <div id="board"></div>

       <button onclick="checkSolution()">Check</button>
       <button onclick="showHint()">Hint</button> 
       <button onclick="solveAI()">AI Solve</button>
        <button onclick="restartLevel()">Restart</button>
        <button onclick="goHome()">Home</button>

    </div>


    <div id="winScreen" class="screen" style="display:none;">

        <h2>Level Complete</h2>

        <p>Time: <span id="finalTime"></span></p>

        <button onclick="nextLevel()">Next Level</button>

        <button onclick="goHome()">Home</button>

    </div>

    <script src="script.js"></script>

    <div id="resetModal" class="modal">
        <div class="modalBox">
            <p>Reset all progress?</p>
            <button onclick="confirmReset()">Yes</button>
            <button onclick="closeReset()">Cancel</button>
        </div>
    </div>

    <div id="popup" class="modal">
        <div class="modalBox">
            <p id="popupText"></p>
            <div id="popupButtons"></div>
        </div>
    </div>

</body>

</html>
